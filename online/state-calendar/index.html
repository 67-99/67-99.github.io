<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互日历</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <script src="../../base.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container"></div>
    </nav>

    <!-- 主容器：左侧日历 + 右侧内容区 -->
    <div class="main-container">
        <!-- 左侧侧边栏 · 改造为完整日历 -->
        <aside class="sidebar calendar-sidebar">
            <!-- 日历头部：月份切换 -->
            <div class="calendar-header">
                <button class="month-nav" id="prevMonthBtn" aria-label="上一月">◀</button>
                <h3 id="displayYearMonth">2026年2月</h3>
                <button class="month-nav" id="nextMonthBtn" aria-label="下一月">▶</button>
            </div>
            <!-- 星期缩写 -->
            <div class="weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <!-- 日历网格 (JS动态填充) -->
            <div class="calendar-grid" id="calendarGrid"></div><!-- 颜色预览折叠面板（可放在 main 内部，或 sidebar 底部） -->
            <div class="color-preview-panel" id="color-preview">
                <div class="preview-header" id="previewToggle">
                    <span>🎨 颜色映射预览</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="slider-container">
                        <label for="valueSlider">数值: <span id="sliderValue">0</span></label>
                        <input type="range" id="valueSlider" min="-100" max="100" value="0" step="1">
                    </div>
                    <div class="color-rect" id="colorRect">
                        <span id="rectHex">#ffffff</span>
                    </div>
                    <div class="preset-buttons">
                        <button data-value="-100">-100</button>
                        <button data-value="-70">-70</button>
                        <button data-value="-40">-40</button>
                        <button data-value="0">0</button>
                        <button data-value="50">50</button>
                        <button data-value="100">100</button>
                    </div>
                </div>
            </div>
            <!-- 小小的提示，不影响交互 -->
            <div class="calendar-footer">点击日期，右侧更新</div>
        </aside>

        <!-- 右侧主要内容区域 · 根据点击的日期变化 -->
        <main class="content" id="content-area">
            <div class="date-card" id="dateDisplayCard">
                <h2 id="displayDate">📅 选定日期</h2>
                <div class="selected-date-info" id="selectedDateInfo">
                    <!-- 日期文本容器（动态填充） -->
                    <span class="date-text" id="dateText">
                        <span style="font-size:2rem; margin-right:8px;">⏳</span>
                        <span>数据加载中...</span>
                    </span>
                    <!-- 编辑/添加数据按钮 -->
                    <button class="edit-btn" id="editDataBtn" style="display: none;">✏️</button>
                </div>
                <!-- 预留扩展区域：可展示更多内容，符合“根据点击的日期改变” -->
                <div class="extra-content" id="extraContent">
                    <p>这里可以根据日期展示不同的备忘或信息</p>
                </div>
            </div>
        </main>
    </div>
</body>
<!-- 模态框（弹窗）放在 body 末尾 -->
<div class="modal-overlay" id="modalOverlay" style="display: none;">
    <div class="modal-card">
        <h3>📝 编辑心情状态</h3>
        <form id="dataForm">
            <div class="form-group">
                <label for="modalDate">日期 (YYYY-MM-DD)</label>
                <input type="text" id="modalDate" placeholder="" required pattern="\d{4}-\d{2}-\d{2}" disabled>
            </div>
            <div class="form-group">
                <label for="modalValue">数值</label>
                <input type="number" id="modalValue" step="1" min="-100" max="100" required>
            </div>
            <div class="form-group">
                <label for="modalDescription">描述</label>
                <textarea id="modalDescription" rows="3" maxlength="500" required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" id="modalCancel">取消</button>
                <button type="submit" id="modalSubmit">保存</button>
            </div>
            <div id="modalError" class="modal-error"></div>
        </form>
    </div>
</div>
</html>
